<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>[v1.2.2]簡易震度計</title>

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  padding:12px;
  background:#0f1115;
  color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  font-variant-numeric:tabular-nums;
}

h1{
  margin:0 0 10px;
  font-size:22px;
}

#errorBox{
  display:none;
  margin-bottom:10px;
  padding:10px 12px;
  border-radius:10px;
  background:#b00020;
  white-space:pre-wrap;
  line-height:1.5;
}

.card{
  background:#1a1f2b;
  border-radius:14px;
  padding:12px;
  margin-bottom:10px;
}

.label{
  opacity:.7;
  font-size:13px;
  margin-bottom:6px;
}

.big{
  font-size:42px;
  font-weight:800;
  line-height:1;
}

.medium{
  font-size:24px;
  font-weight:700;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

canvas{
  width:100%;
  height:120px;
  background:#0c0f14;
  border-radius:10px;
  display:block;
}

.note{
  margin-top:10px;
  opacity:.55;
  font-size:11px;
  line-height:1.5;
}

#startModal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.75);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
}

#modalContent{
  width:min(90%,400px);
  background:#1a1f2b;
  border-radius:18px;
  padding:26px;
  text-align:center;
}

#modalContent h2{
  margin:0 0 22px;
  font-size:24px;
}

button{
  width:100%;
  border:none;
  border-radius:12px;
  padding:16px;
  background:#2b6fff;
  color:#fff;
  font-size:18px;
  font-weight:700;
  cursor:pointer;
}

#debugInfo{
  opacity:.65;
  font-size:12px;
  line-height:1.7;
  white-space:pre-wrap;
}

.detailTable{
  width:100%;
  border-collapse:collapse;
  font-size:13px;
}

.detailTable td{
  padding:6px 0;
  border-bottom:1px solid rgba(255,255,255,.08);
}

.detailValue{
  text-align:right;
  font-family:monospace;
  font-variant-numeric:tabular-nums;
}
</style>
</head>

<body>

<h1>簡易震度計</h1>

<div id="errorBox"></div>

<div id="startModal">
  <div id="modalContent">

    <h2>Earthquake Intensity Monitor</h2>

    <button id="startBtn">
      観測開始
    </button>

  </div>
</div>

<div class="card">

  <div class="label">
    推定震度
  </div>

  <div class="big" id="shindo">
    --
  </div>

</div>

<div class="grid">

  <div class="card">

    <div class="label">
      計測震度
    </div>

    <div class="medium" id="calcIntensity">
      --
    </div>

  </div>

  <div class="card">

    <div class="label">
      リアルタイム加速度
    </div>

    <div class="medium">
      <span id="currentAcc">--</span> gal
    </div>

  </div>

</div>

<div class="grid">

  <div class="card">

    <div class="label">
      0.3秒最大加速度
    </div>

    <div class="medium">
      <span id="pga">--</span> gal
    </div>

  </div>

  <div class="card">

    <div class="label">
      センサー更新頻度
    </div>

    <div class="medium">
      <span id="hz">--</span> Hz
    </div>

  </div>

</div>

<div class="card">

  <div class="label">
    波形
  </div>

  <canvas id="waveCanvas"
          width="800"
          height="120"></canvas>

</div>

<div class="card">

  <table class="detailTable">

    <tr>
      <td>X軸加速度</td>
      <td class="detailValue" id="xVal">
        --
      </td>

      <td>Y軸加速度</td>
      <td class="detailValue" id="yVal">
        --
      </td>
    </tr>

    <tr>
      <td>Z軸加速度</td>
      <td class="detailValue" id="zVal">
        --
      </td>

      <td>合成加速度</td>
      <td class="detailValue" id="vectorVal">
        --
      </td>
    </tr>

  </table>

</div>

<div class="note">
※スマートフォン内蔵センサーによる簡易観測です。<br>
気象庁震度階級とは一致しない場合があります。
</div>

<script>
const errorBox =
  document.getElementById("errorBox");

const startBtn =
  document.getElementById("startBtn");

const canvas =
  document.getElementById("waveCanvas");

const ctx =
  canvas.getContext("2d");

let waveData = [];

function showError(message, fatal = false){

  console.error(message);

  errorBox.style.display = "block";

  errorBox.textContent = message;

  if(fatal){

    alert(message);

  }else{

    setTimeout(() => {

      errorBox.style.display = "none";

    }, 5000);

  }

}

window.onerror = (msg, src, line, col) => {

  showError(
`JavaScript Error

${msg}

${src}:${line}:${col}`
  );

};

window.onunhandledrejection = (e) => {

  showError(
`Promise Error

${e.reason}`
  );

};

startBtn.addEventListener("click", async () => {

  try{

    errorBox.style.display = "none";

    startBtn.textContent =
      "センサー初期化中...";

    if(
      typeof DeviceMotionEvent !== "undefined" &&
      typeof DeviceMotionEvent.requestPermission === "function"
    ){

      const permission =
        await DeviceMotionEvent.requestPermission();

      if(permission !== "granted"){

        throw new Error(
          "モーションセンサーへのアクセスが拒否されました"
        );

      }

    }

    startObservation();

    document.getElementById("startModal")
      .remove();

  }catch(err){

    showError(err.message, true);

  }

});

function drawWave(){

  ctx.clearRect(
    0,
    0,
    canvas.width,
    canvas.height
  );

  ctx.beginPath();

  for(let i = 0; i < waveData.length; i++){

    const x =
      i *
      (canvas.width / waveData.length);

    const scale = 0.35;

    const y = canvas.height / 2 - Math.max( -50, Math.min(50, waveData[i] * scale) );

    if(i === 0){

      ctx.moveTo(x, y);

    }else{

      ctx.lineTo(x, y);

    }

  }

  ctx.strokeStyle = "#2b6fff";
  ctx.lineWidth = 2;
  ctx.stroke();

}

function startObservation(){

  let lastTime =
    performance.now();

  let lastUIUpdate = 0;

  let accHistory = [];

  let max03 = 0;

  window.addEventListener(
    "devicemotion",
    (event) => {

    try{

      const acc = event.accelerationIncludingGravity || event.acceleration;

      if(!acc){

        throw new Error(
          "加速度データを取得できません"
        );

      }

      const x = acc.x || 0;
      const y = acc.y || 0;
      const z = acc.z || 0;

      const vector =
        Math.sqrt(
          x*x +
          y*y +
          z*z
        );

      const gal =
        vector * 100;

      const nowSec =
        performance.now() / 1000;

      accHistory.push({
        time: nowSec,
        gal: gal
      });

      accHistory =
        accHistory.filter(
          d => nowSec - d.time <= 0.3
        );

      max03 =
        Math.max(
          ...accHistory.map(
            d => d.gal
          )
        );

      const intensity =
  1.6 *
  Math.log10(
    Math.max(max03, 0.1)
  ) - 0.2;

      let shindo = "0";

      if(intensity >= 0.5) shindo = "1";
      if(intensity >= 1.5) shindo = "2";
      if(intensity >= 2.5) shindo = "3";
      if(intensity >= 3.5) shindo = "4";
      if(intensity >= 4.5) shindo = "5弱";
      if(intensity >= 5.0) shindo = "5強";
      if(intensity >= 5.5) shindo = "6弱";
      if(intensity >= 6.0) shindo = "6強";
      if(intensity >= 6.5) shindo = "7";

      const now =
        performance.now();

      const dt =
        now - lastTime;

      lastTime = now;

      const hz = dt > 0 ? 1000 / dt : 0;

      waveData.push(gal);

      if(waveData.length > 120){

        waveData.shift();

      }

      const nowUI =
        performance.now();

      if(nowUI - lastUIUpdate > 25){

        lastUIUpdate = nowUI;

        document.getElementById("shindo")
          .textContent = shindo;

        document.getElementById("calcIntensity")
          .textContent =
            intensity.toFixed(1);

        document.getElementById("currentAcc")
          .textContent =
            gal.toFixed(1);

        document.getElementById("pga")
          .textContent =
            max03.toFixed(1);

        document.getElementById("hz")
          .textContent =
            hz.toFixed(1);

        document.getElementById("xVal")
          .textContent =
            `${x.toFixed(2)} m/s²`;
        
        document.getElementById("yVal")
          .textContent =
            `${y.toFixed(2)} m/s²`;
        
        document.getElementById("zVal")
          .textContent =
            `${z.toFixed(2)} m/s²`;
        
        document.getElementById("vectorVal")
          .textContent =
            `${gal.toFixed(1)} gal`;

        drawWave();

      }

    }catch(err){

      showError(
        "センサー処理エラー\n\n" +
        err.message
      );

    }

  });

}
</script>

</body>
</html>
