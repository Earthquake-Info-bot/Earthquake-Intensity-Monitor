<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>[v1.1.6]簡易震度計</title>

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  padding:20px;
  background:#0f1115;
  color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  font-variant-numeric: tabular-nums;
}
  
h1{
  margin-top:0;
  font-size:28px;
}

#errorBox{
  display:none;
  margin-bottom:12px;
  padding:12px;
  border-radius:10px;
  background:#b00020;
  color:#fff;
  white-space:pre-wrap;
  line-height:1.5;
}

.card{
  background:#1a1f2b;
  border-radius:14px;
  padding:16px;
  margin-bottom:16px;
}

.label{
  opacity:0.7;
  font-size:14px;
  margin-bottom:6px;
}

.big{
  font-size:56px;
  font-weight:800;
  line-height:1;
}

.medium{
  font-size:30px;
  font-weight:700;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.value{
  font-size:24px;
  font-weight:700;
  font-variant-numeric: tabular-nums;
}

.small{
  opacity:0.75;
  font-size:13px;
}

button{
  width:100%;
  border:none;
  border-radius:12px;
  padding:16px;
  background:#2b6fff;
  color:#fff;
  font-size:18px;
  font-weight:700;
  cursor:pointer;
}

button:disabled{
  opacity:1;
  background:#1f9d55;
  color:#fff;
  cursor:default;
}

canvas{
  width:100%;
  height:180px;
  background:#0c0f14;
  border-radius:12px;
  display:block;
}

#startModal{
  position:fixed;
  inset:0;

  background:rgba(0,0,0,0.75);

  display:flex;
  align-items:center;
  justify-content:center;

  z-index:9999;
}

#modalContent{
  width:min(90%, 420px);

  background:#1a1f2b;

  border-radius:18px;

  padding:28px;

  text-align:center;
}

#modalContent h2{
  margin-top:0;
  margin-bottom:24px;

  font-size:24px;
}

#debugInfo{
  margin-top:20px;

  opacity:0.45;

  font-size:12px;
  line-height:1.6;

  font-family:monospace;

  white-space:pre-wrap;
}

.note{
  margin-top:16px;
  opacity:0.65;
  font-size:13px;
  line-height:1.6;
}
</style>
</head>
<body>
  
<h1>簡易震度計</h1>
  
<div id="errorBox"></div>
<div id="startModal">
  <div id="modalContent">

    <h2>Earthquake Intensity Monitor</h2>

    <button id="startBtn">
      観測開始
    </button>

  </div>
</div>

<div class="card">
  <div class="label">推定震度</div>
  <div class="big" id="shindo">
    --
  </div>
</div>

<div class="grid">

  <div class="card">
    <div class="label">計測震度</div>
    <div class="medium" id="calcIntensity">
      --
    </div>
  </div>

  <div class="card">
    <div class="label">最大加速度</div>
    <div class="medium">
      <span id="pga">--</span> gal
    </div>
  </div>

</div>

<div class="card">
  <div class="label">リアルタイム合成加速度</div>
  <div class="medium">
    <span id="currentAcc">--</span> gal
  </div>
</div>

<div class="card">
  <div class="label">波形</div>
  <canvas id="waveCanvas" width="800" height="180"></canvas>
</div>

<div id="debugInfo"></div>
  
<div class="note">
※スマートフォン内蔵センサーを用いた簡易観測です。気象庁発表の震度とは一致しない場合があります。
</div>

<script>
const errorBox = document.getElementById("errorBox");
const startBtn = document.getElementById("startBtn");

function showError(message, fatal = false){
  console.error(message);
  errorBox.style.display = "block";
  errorBox.textContent = message;
  if(fatal){
    alert(message);
  }
}

window.onerror = (msg, src, line, col) => {
  showError(
`JavaScript Error

${msg}

${src}:${line}:${col}`
  );
};

window.onunhandledrejection = (e) => {
  showError(
`Promise Error

${e.reason}`
  );
};

startBtn.addEventListener("click", async () => {
  try{
    errorBox.style.display = "none";
    startBtn.textContent = "センサー初期化中...";
    if(
      typeof DeviceMotionEvent !== "undefined" &&
      typeof DeviceMotionEvent.requestPermission === "function"
    ){
      const permission = await DeviceMotionEvent.requestPermission();
      if(permission !== "granted"){
        throw new Error("モーションセンサーへのアクセスが拒否されました");
      }
    }
    startObservation();
    document.getElementById("startModal").remove();
  }catch(err){
    showError(err.message, true);
  }
});

function startObservation(){
  let lastTime = performance.now();
  let lastUIUpdate = 0;
  window.addEventListener("devicemotion", (event) => {
    try{
      const acc = event.acceleration;
      if(!acc){
        throw new Error("加速度データを取得できません");
      }
      const x = acc.x || 0;
      const y = acc.y || 0;
      const z = acc.z || 0;
      const vector = Math.sqrt(x*x + y*y + z*z);
      const gal = vector * 100;
      
      const now = performance.now();
      const dt = now - lastTime;
      lastTime = now;
      const hz = 1000 / dt;
      const nowUI = performance.now();
      
      if(nowUI - lastUIUpdate > 25){
        lastUIUpdate = nowUI;
         document.getElementById("debugInfo").textContent =
`Ｘ加速度：${x.toFixed(3)}
Ｙ加速度：${y.toFixed(3)}
Ｚ加速度：${z.toFixed(3)}
合成：${gal.toFixed(1)} gal
サンプルレート：${hz.toFixed(1)}`;
      }
    }catch(err){
      showError("センサー処理エラー\n\n" + err.message);
    }
  });
}
</script>
</body>
</html>
